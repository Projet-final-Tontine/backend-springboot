spring:
  application:
    name: tontine-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tontine_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    # Cle secrete de signature des jetons (>= 32 caracteres). A definir via
    # la variable d'environnement JWT_SECRET en production.
    secret: ${JWT_SECRET:changez-cette-cle-secrete-tontine-sol-en-ligne-2026-fds-ueh}
    # Duree de validite d'un jeton : 24 heures (en millisecondes).
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
